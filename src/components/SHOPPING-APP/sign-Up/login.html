<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script
      src="https://kit.fontawesome.com/64d58efce2.js"
      crossorigin="anonymous"
    ></script>
    <link rel="stylesheet" href="login.css" />

    <!-- website title  -->
    <title>Glamiee</title>

    <!-- website icon  -->
     <link rel="website icon" type="png" href="/assets/website-icon.png">
  </head>
  <body>
    <div class="container">
      <div class="forms-container">
        <div class="signin-signup">

          <!-- sign in form  -->
          <form action="#" class="sign-in-form">
            <h2 class="title">Sign in</h2>
            <div class="input-wrapper">
                
              <input type="text" placeholder="Username" class="input-field" />
              <ion-icon name="person" class="icon-wrapper"></ion-icon>
            </div>
            <div class="input-wrapper">
                
              <input type="password" placeholder="Password" class="input-field"/>
              <ion-icon name="lock-open" class="icon-wrapper"></ion-icon>
            </div>
            <input type="submit" value="Login" class="btn solid" />
            <p class="social-text">Or Sign in with social platforms</p>
            <div class="social-media">
              <a href="https://www.instagram.com/_slayy.gurl_10?igsh=OGQ5ZDc2ODk2ZA%3D%3D&utm_source=qr" class="social-icon">
                <ion-icon name="logo-instagram"></ion-icon>
              </a>
              <a href="https://www.pinterest.com/" class="social-icon">
                <ion-icon name="logo-pinterest"></ion-icon>
              </a>
              <a href="https://www.google.co.in/" class="social-icon">
                <ion-icon name="logo-Google"></ion-icon>
              </a>
              <a href="https://www.facebook.com/profile.php?id=100073859045509&mibextid=LQQJ4d" class="social-icon">
                <ion-icon name="logo-facebook"></ion-icon>
              </a>
            </div>
          </form>

          <!-- sign up form  -->
          <form action="#" class="sign-up-form">
            <h2 class="title">Sign up</h2>
            <div class="input-wrapper">
             
              <input type="text" placeholder="Username" class="input-field"/>
              <ion-icon name="person" class="icon-wrapper"></ion-icon>
            </div>
            <div class="input-wrapper">
             
              <input type="email" placeholder="Email"  class="input-field"/>
              <ion-icon name="mail-unread-outline" class="icon-wrapper"></ion-icon>
            </div>
            <div class="input-wrapper">
             
              <input type="password" placeholder="Password" class="input-field"/>
              <ion-icon name="lock-open" class="icon-wrapper"></ion-icon>
            </div>
            <input type="submit" class="btn" value="Sign up" />
            <p class="social-text">Or Sign up with social platforms</p>
            <div class="social-media">
              <a href="https://www.instagram.com/_slayy.gurl_10?igsh=OGQ5ZDc2ODk2ZA%3D%3D&utm_source=qr" class="social-icon">
                <ion-icon name="logo-instagram"></ion-icon>
              </a>
              <a href="https://www.pinterest.com/" class="social-icon">
                <ion-icon name="logo-pinterest"></ion-icon>
              </a>
              <a href="https://www.google.co.in/" class="social-icon">
                <ion-icon name="logo-Google"></ion-icon>
              </a>
              <a href="https://www.facebook.com/profile.php?id=100073859045509&mibextid=LQQJ4d" class="social-icon">
                <ion-icon name="logo-facebook"></ion-icon>
              </a>
            </div>
          </form>
        </div>
      </div>

      <div class="panels-container">
        <div class="panel left-panel">
          <div class="content">
            <h3>New here ?</h3>
            <p>
              If you'r new here please sign up for an account...
            </p>
            <button class="btn-gradient" id="sign-up-btn">
              Sign up
            </button>

           
          </div>
          <img src="img/log.svg" class="image" alt="" />
        </div>
        <div class="panel right-panel">
          <div class="content">
            <h3>One of us ?</h3>
            <p>
              Now You are the one of our company member...
            </p>

            <button class="btn-gradient" id="sign-in-btn">
              Sign in
            </button>


          </div>
          <img src="img/register.svg" class="image" alt="" />
        </div>
      </div>
    </div>

    <script src="login.js"></script>

    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>




  </body>

</html>
